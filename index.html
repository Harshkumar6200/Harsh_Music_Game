<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S.S SONGS</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<audio id="audioPlayer"></audio>

<div class="bg-glow glow1"></div>
<div class="bg-glow glow2"></div>
<div class="bg-glow glow3"></div>

<div class="app">
    <div class="top-bar">
        <h1 id="songTitle">S.S SONGS</h1>
        <p id="artist">Harsh Music Game</p>
    </div>

    <div class="album-container">
        <img id="cover" src="images/cover1.jpg" alt="cover">
    </div>

    <div class="track-info">
        <span id="trackText">TRACK 1 ACTIVE</span>

    </div>

    <div class="controls">
        <button class="btn cyan" onclick="playSong(0)">1</button>
        <button class="btn purple" onclick="playSong(1)">2</button>
        <button class="btn pink" onclick="playSong(2)">3</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
